<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Food Truck Rewards</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://js.stripe.com/v3/"></script>
<style>
:root {
  /* Warm cream light base */
  --bg:#FFF8F0;--s1:#FFFFFF;--s2:#FFF2E6;--s3:#FFE8D4;
  /* Borders — warm tan, visible but soft */
  --b1:rgba(180,120,60,0.12);--b2:rgba(180,120,60,0.2);--b3:rgba(180,120,60,0.32);
  /* Text — rich warm brown */
  --tx:#2D1B0E;--mu:rgba(45,27,14,0.5);--fa:rgba(45,27,14,0.2);
  /* Brand colors — vibrant food truck palette */
  --or:#FF5722;--gd:#F9A825;--gn:#2E7D32;--rd:#C62828;--bl:#1565C0;
  --brand:#FF5722;--brand2:#F9A825;
  /* Shadows for light mode depth */
  --sh1:0 1px 4px rgba(180,100,40,.10);
  --sh2:0 4px 16px rgba(180,100,40,.13);
  --sh3:0 8px 32px rgba(180,100,40,.18);
  --nav:66px;--sb:env(safe-area-inset-bottom,0px);
  --fd:'Nunito',sans-serif;--fd-weight:900;--fb:'Nunito',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--fb);-webkit-font-smoothing:antialiased}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;overflow:hidden;background:var(--bg)}

/* Subtle dot pattern on bg for texture */
#app::before{content:'';position:fixed;inset:0;max-width:430px;margin:0 auto;background-image:radial-gradient(circle,rgba(255,87,34,.08) 1px,transparent 1px);background-size:20px 20px;pointer-events:none;z-index:0}
.scroll,#scroll{position:relative;z-index:1}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 18px 8px;padding-top:calc(10px + env(safe-area-inset-top,0px));background:var(--brand);flex-shrink:0;z-index:60;box-shadow:0 2px 12px rgba(255,87,34,.3)}
.tl-logo{font-family:var(--fd);font-weight:900;font-size:18px;letter-spacing:.3px;color:white;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.mode-tog{display:flex;background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.35);border-radius:99px;padding:3px;gap:2px}
.mb{padding:5px 12px;border-radius:99px;font-size:11px;font-weight:700;border:none;cursor:pointer;font-family:var(--fb);transition:all .2s;background:transparent;color:rgba(255,255,255,.8)}
.mb.on{background:white;color:var(--brand);box-shadow:var(--sh1)}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;overscroll-behavior:none}
.scroll::-webkit-scrollbar{display:none}
.bnav{display:flex;align-items:stretch;background:white;border-top:2px solid var(--b2);padding-bottom:var(--sb);height:var(--nav);flex-shrink:0;box-shadow:0 -4px 20px rgba(180,100,40,.1)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;color:var(--mu);font-size:10px;font-weight:700;font-family:var(--fb);transition:color .15s;padding:6px 0 4px}
.ni-icon{font-size:20px;line-height:1;transition:transform .2s}
.ni.on{color:var(--brand)}
.ni.on .ni-icon{transform:translateY(-2px)}
.ni-pip{width:4px;height:4px;background:var(--brand);border-radius:50%;opacity:0;margin-top:-1px}
.ni.on .ni-pip{opacity:1}
.screen{display:none;min-height:100%}
.screen.on{display:block}
.sh{padding:18px 20px 14px;position:sticky;top:0;background:white;z-index:10;border-bottom:2px solid var(--b1);box-shadow:var(--sh1)}
.sh h1{font-family:var(--fd);font-weight:900;font-size:22px;color:var(--tx)}
.sh p{font-size:12px;color:var(--mu);margin-top:3px;font-weight:600}
.sh-row{display:flex;align-items:center;gap:10px}
.back-btn{width:36px;height:36px;background:var(--s2);border:1.5px solid var(--b2);border-radius:11px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;flex-shrink:0;box-shadow:var(--sh1)}
.back-btn:active{background:var(--s3)}
.bp{padding:16px 20px 90px}
.card{background:white;border:1.5px solid var(--b2);border-radius:18px;padding:16px;margin-bottom:12px;box-shadow:var(--sh2)}
.card-title{font-family:var(--fd);font-weight:900;font-size:15px;color:var(--tx);margin-bottom:12px}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;color:var(--mu);margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:2px solid var(--b2);border-radius:12px;padding:13px 14px;color:var(--tx);font-size:16px;font-family:var(--fb);font-weight:600;outline:none;transition:border-color .2s;-webkit-appearance:none}
.field input:focus,.field select:focus{border-color:var(--brand);background:white;box-shadow:0 0 0 3px rgba(255,87,34,.1)}
.field input.err{border-color:var(--rd)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:14px;padding:15px 20px;font-family:var(--fd);font-size:17px;cursor:pointer;width:100%;transition:all .15s;letter-spacing:.3px}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
.btn-p{background:var(--brand);color:white;box-shadow:0 4px 14px rgba(255,87,34,.4)}
.btn-p:active{box-shadow:0 2px 6px rgba(255,87,34,.3)}
.btn-s{background:white;color:var(--tx);border:2px solid var(--b2);box-shadow:var(--sh1)}
.btn-g{background:transparent;color:var(--mu);border:2px solid var(--b2)}
.btn-gn{background:rgba(46,125,50,.08);color:#2E7D32;border:2px solid rgba(46,125,50,.25)}
.btn-gd{background:rgba(249,168,37,.1);color:#E65100;border:2px solid rgba(249,168,37,.3)}
.btn-sm{padding:9px 16px;font-size:14px;border-radius:10px;width:auto;font-family:var(--fd)}
.btn-row{display:flex;gap:10px}
.tr{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1.5px solid var(--b1)}
.tr:last-child{border-bottom:none}
.tr-info .tt{font-size:14px;font-weight:700;margin-bottom:2px}
.tr-info .td{font-size:12px;color:var(--mu);line-height:1.4;font-weight:600}
.tog{position:relative;width:48px;height:28px;flex-shrink:0;margin-left:16px}
.tog input{opacity:0;width:0;height:0;position:absolute}
.tog-track{position:absolute;inset:0;background:var(--s3);border:2px solid var(--b2);border-radius:999px;cursor:pointer;transition:all .2s}
.tog input:checked+.tog-track{background:var(--brand);border-color:var(--brand)}
.tog-track::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;background:white;border-radius:50%;transition:transform .2s;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.tog input:checked+.tog-track::after{transform:translateX(20px)}
.li{display:flex;align-items:center;gap:12px;background:white;border:1.5px solid var(--b2);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:var(--sh1)}
.li-icon{font-size:22px;width:44px;height:44px;background:var(--s2);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.li-info{flex:1;min-width:0}
.li-name{font-size:14px;font-weight:700;margin-bottom:2px}
.li-sub{font-size:12px;color:var(--mu);font-weight:600}
.li-act{display:flex;gap:6px;flex-shrink:0}
.iBtn{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--b2);background:var(--s2);color:var(--mu);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.iBtn:active{background:#FFF0EE;color:var(--rd)}
.tag{display:inline-flex;align-items:center;padding:4px 10px;border-radius:99px;font-size:11px;font-weight:800;flex-shrink:0}
.tag-gn{background:#E8F5E9;color:#2E7D32;border:1.5px solid #A5D6A7}
.tag-gd{background:#FFF8E1;color:#E65100;border:1.5px solid #FFE082}
.tag-or{background:#FFF3E0;color:#E64A19;border:1.5px solid #FFCC80}
.tag-bl{background:#E3F2FD;color:#1565C0;border:1.5px solid #90CAF9}
.callout{display:flex;gap:12px;padding:13px 15px;border-radius:14px;margin-bottom:12px;box-shadow:var(--sh1)}
.co-gn{background:#F1F8E9;border:1.5px solid #C5E1A5}
.co-or{background:#FFF3E0;border:1.5px solid #FFCC80}
.co-gd{background:#FFFDE7;border:1.5px solid #FFE082}
.co-bl{background:#E3F2FD;border:1.5px solid #90CAF9}
.co-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.co-title{font-size:12px;font-weight:800;margin-bottom:3px}
.co-gn .co-title{color:#2E7D32}
.co-or .co-title{color:#E64A19}
.co-gd .co-title{color:#F57F17}
.co-bl .co-title{color:#1565C0}
.co-desc{font-size:12px;color:var(--mu);line-height:1.5;font-weight:600}
.stats{display:grid;gap:10px;margin-bottom:12px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.sc{background:white;border:1.5px solid var(--b2);border-radius:14px;padding:14px 12px;text-align:center;box-shadow:var(--sh1)}
.sv{font-family:var(--fd);font-weight:900;font-size:24px;line-height:1;margin-bottom:3px}
.sl{font-size:10px;color:var(--mu);letter-spacing:.5px;text-transform:uppercase;font-weight:700}
.pbar{background:var(--s2);border-radius:99px;height:10px;overflow:hidden;border:1.5px solid var(--b1)}
.pfill{height:100%;border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1);background:linear-gradient(90deg,var(--brand),var(--brand2))}
/* OVERLAY/SHEET */
.overlay{position:fixed;inset:0;background:rgba(45,27,14,.55);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(8px)}
.overlay.open{display:flex}
.sheet{background:white;border-radius:28px 28px 0 0;padding:20px 20px calc(20px + var(--sb));width:100%;border-top:3px solid var(--b2);animation:sheetUp .3s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(180,100,40,.15)}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-handle{width:40px;height:5px;background:var(--b2);border-radius:99px;margin:0 auto 18px}
.sheet-title{font-family:var(--fd);font-weight:900;font-size:20px;color:var(--tx);margin-bottom:16px}
/* TOAST */
.toast{position:fixed;bottom:calc(var(--nav) + 14px);left:50%;transform:translateX(-50%);background:var(--tx);color:white;padding:11px 22px;border-radius:99px;font-size:13px;font-weight:700;white-space:nowrap;opacity:0;transition:opacity .25s;z-index:500;pointer-events:none;box-shadow:0 8px 32px rgba(45,27,14,.25)}
.toast.show{opacity:1}
/* CONFETTI */
.cc-wrap{position:fixed;inset:0;pointer-events:none;z-index:400;overflow:hidden}
.cp{position:absolute;top:-20px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
/* LOADING */
.load-over{position:fixed;inset:0;background:rgba(255,248,240,.9);z-index:800;display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;backdrop-filter:blur(8px)}
.load-over.show{display:flex}
.lspin{width:44px;height:44px;border:4px solid var(--b2);border-top-color:var(--brand);border-radius:50%;animation:spin .8s linear infinite}
.ltxt{font-size:14px;color:var(--mu);font-weight:700}
@keyframes spin{to{transform:rotate(360deg)}}

/* AUTH */
.auth-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 48px;background:linear-gradient(160deg,#FFF3E0 0%,#FFF8F0 60%)}
.auth-logo{font-size:56px;margin-bottom:12px;animation:float 3s ease-in-out infinite;filter:drop-shadow(0 4px 8px rgba(255,87,34,.3))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.auth-title{font-family:var(--fd);font-weight:900;font-size:30px;color:var(--tx);margin-bottom:6px;text-align:center}
.auth-sub{font-size:14px;color:var(--mu);margin-bottom:24px;text-align:center;line-height:1.6;max-width:300px;font-weight:600}
.auth-form{width:100%}
.auth-err{background:#FFEBEE;border:2px solid #EF9A9A;border-radius:12px;padding:11px 14px;font-size:13px;color:#C62828;margin-bottom:14px;display:none;font-weight:700}
.auth-err.show{display:block}
.auth-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--mu);font-weight:600}
.auth-switch span{color:var(--brand);cursor:pointer;font-weight:800}

/* VENDOR HERO */
.vh-hero{padding:24px 20px 18px;border-bottom:2px solid var(--b1);background:linear-gradient(135deg,#FF5722 0%,#FF8A65 100%);position:relative;overflow:hidden}
.vh-hero::after{content:'🚚';position:absolute;right:-10px;bottom:-14px;font-size:80px;opacity:.12;pointer-events:none}
.vh-greet{font-size:11px;color:rgba(255,255,255,.8);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;font-weight:700}
.vh-name{font-family:var(--fd);font-weight:900;font-size:26px;color:white;margin-bottom:10px;text-shadow:0 1px 4px rgba(0,0,0,.15)}
.live-pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.25);border:1.5px solid rgba(255,255,255,.45);border-radius:99px;padding:5px 14px;font-size:12px;font-weight:700;color:white}
.ldot{width:6px;height:6px;background:white;border-radius:50%;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* QUICK ACTIONS */
.qa-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 20px}
.qa{background:white;border:2px solid var(--b2);border-radius:18px;padding:16px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:6px;box-shadow:var(--sh1)}
.qa:active{transform:scale(.97);background:var(--s2)}
.qa.wide{grid-column:span 2;flex-direction:row;align-items:center;gap:14px}
.qa.accent{background:#FFF3E0;border-color:#FFCC80}
.qa.accent-gd{background:#FFFDE7;border-color:#FFE082}
.qa.accent-gn{background:#F1F8E9;border-color:#C5E1A5}
.qa-ico{font-size:28px}
.qa.wide .qa-ico{font-size:32px}
.qa-lbl{font-size:13px;font-weight:800;line-height:1.3}
.qa-sub{font-size:11px;color:var(--mu);font-weight:600}

/* CUSTOMER MY TRUCKS */
.truck-card{background:white;border:2px solid var(--b2);border-radius:18px;padding:16px;margin-bottom:12px;cursor:pointer;transition:all .15s;box-shadow:var(--sh2)}
.truck-card:active{transform:scale(.98)}
.truck-card.active-truck{border-color:#FFCC80;background:#FFFDE7}
.tc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.tc-icon{width:52px;height:52px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;box-shadow:var(--sh1)}
.tc-name{font-family:var(--fd);font-weight:900;font-size:18px;color:var(--tx);margin-bottom:2px}
.tc-sub{font-size:12px;color:var(--mu);font-weight:600}
.tc-stats{display:flex;gap:8px}
.tc-stat{flex:1;background:var(--s2);border-radius:12px;padding:10px 8px;text-align:center;border:1.5px solid var(--b1)}
.tc-stat-val{font-family:var(--fd);font-weight:900;font-size:18px;line-height:1}
.tc-stat-lbl{font-size:10px;color:var(--mu);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;font-weight:700}

/* CUSTOMER QR */
.my-qr-wrap{background:white;border-radius:20px;padding:20px;display:inline-flex;flex-direction:column;align-items:center;gap:10px;border:3px solid var(--b2);box-shadow:var(--sh3)}
.my-qr-id{font-size:14px;color:var(--tx);font-weight:800;letter-spacing:2px;font-family:monospace}

/* VENDOR AWARD POINTS */
.award-tabs{display:flex;background:var(--s2);border:2px solid var(--b2);border-radius:14px;padding:4px;gap:4px;margin-bottom:16px}
.award-tab{flex:1;padding:10px 8px;border:none;border-radius:11px;font-size:12px;font-weight:700;font-family:var(--fb);cursor:pointer;background:transparent;color:var(--mu);transition:all .2s;text-align:center}
.award-tab.on{background:white;color:var(--tx);box-shadow:var(--sh1)}
.award-method{display:none}
.award-method.on{display:block}

/* SPIN */
.spin-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;padding:20px 24px 40px;text-align:center;background:linear-gradient(160deg,#FFF3E0 0%,#FFF8F0 100%)}
.spin-title{font-family:var(--fd);font-weight:900;font-size:26px;color:var(--tx);margin-bottom:4px}
.spin-sub{font-size:13px;color:var(--mu);margin-bottom:16px;font-weight:600}
.spp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px;width:100%}
.spp-item{background:white;border:2px solid var(--b2);border-radius:12px;padding:10px 8px;text-align:center;box-shadow:var(--sh1)}
.spp-pts{font-family:var(--fd);font-weight:900;font-size:15px;color:#E65100;line-height:1}
.spp-lbl{font-size:10px;color:var(--mu);margin-top:3px;font-weight:700}
.spp-item.jackpot{border-color:#FFE082;background:#FFFDE7}
.wheel-area{position:relative;margin-bottom:16px}
.wheel-ptr{position:absolute;top:-10px;left:50%;transform:translateX(-50%);font-size:24px;z-index:5;filter:drop-shadow(0 2px 8px rgba(255,87,34,.9))}

/* STREAK */
.sk-card{background:white;border:2px solid var(--b2);border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh1)}
.sk-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sk-lbl{font-size:13px;font-weight:800}
.sk-cnt{font-family:var(--fd);font-weight:900;font-size:20px;color:var(--brand)}
.sk-days{display:flex;gap:5px}
.sd{flex:1;aspect-ratio:1;border-radius:8px;font-size:9px;font-weight:800;text-transform:uppercase;display:flex;align-items:center;justify-content:center}
.sd.done{background:var(--brand);color:white;box-shadow:0 2px 8px rgba(255,87,34,.35)}
.sd.today{background:var(--brand);color:white;box-shadow:0 0 16px rgba(255,87,34,.55)}
.sd.future{background:var(--s2);color:var(--fa);border:1.5px solid var(--b1)}

/* REWARDS */
.rrow{display:flex;align-items:center;gap:12px;background:white;border:2px solid var(--b2);border-radius:14px;padding:12px;margin-bottom:9px;box-shadow:var(--sh1)}
.rrow.unlocked{border-color:#A5D6A7;background:#F1F8E9}
.rico{width:40px;height:40px;border-radius:10px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rinfo{flex:1}
.rname{font-size:14px;font-weight:700;margin-bottom:2px}
.rpts{font-size:12px;color:var(--mu);font-weight:600}
.rdm-btn{border:none;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;font-family:var(--fb);cursor:pointer;flex-shrink:0}
.rdm-btn.ready{background:#2E7D32;color:white;box-shadow:0 2px 8px rgba(46,125,50,.3)}
.rdm-btn.locked{background:var(--s2);color:var(--mu);border:2px solid var(--b2)}

/* REDEMPTION CODE BOX */
.code-box{background:var(--s2);border:3px dashed var(--b3);border-radius:16px;padding:20px;text-align:center;margin-bottom:14px}
.code-val{font-family:var(--fd);font-weight:900;font-size:34px;color:#E65100;margin-bottom:6px;letter-spacing:3px}
.code-sub{font-size:12px;color:var(--mu);line-height:1.5;font-weight:600}
.rdm-step{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;font-size:13px;color:var(--mu);line-height:1.5;font-weight:600}
.rdm-step:last-child{margin-bottom:0}
.rdm-step-num{width:24px;height:24px;background:var(--brand);color:white;border-radius:50%;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;box-shadow:0 2px 8px rgba(255,87,34,.35)}

/* HISTORY */
.hist-item{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1.5px solid var(--b1)}
.hist-item:last-child{border-bottom:none}
.hist-left{display:flex;align-items:center;gap:10px}
.hist-ico{width:36px;height:36px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:1.5px solid var(--b1)}
